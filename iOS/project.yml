name: Coldplunge
options:
  bundleIdPrefix: com.shimondeitel.coldplunge
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Coldplunge:
    type: application
    platform: iOS
    sources:
      - path: Coldplunge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coldplunge
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Coldplunge/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ColdplungeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ColdplungeTests
      - path: Coldplunge.storekit
    dependencies:
      - target: Coldplunge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coldplunge.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ColdplungeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ColdplungeUITests
    dependencies:
      - target: Coldplunge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coldplunge.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Coldplunge:
    build:
      targets:
        Coldplunge: all
        ColdplungeTests: [test]
        ColdplungeUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Coldplunge.storekit
    test:
      config: Debug
      storeKitConfiguration: Coldplunge.storekit
      targets:
        - ColdplungeTests
        - ColdplungeUITests
    archive:
      config: Release
